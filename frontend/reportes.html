<!doctype html>

<html lang="Es">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Dashboard - Panel de Administración</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <link rel="stylesheet" href="css/style.css" />

    <link rel="stylesheet" href="css/responsive.css" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

</head>



<body>

    <!-- TOPBAR (solo visible en móvil) -->

    <div class="topbar">

        <div class="title-business">

            <span>JUANITO SAC</span>

        </div>

        <div class="btn-menu">

            <button class="hamburger" aria-label="Abrir menú">

                <i class="fa-solid fa-bars"></i>

            </button>

        </div>

    </div>



    <!-- OVERLAY -->

    <div class="overlay"></div>



    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="sidebar-logo">Dashboard</div>

        <ul>

            <li>

                <a href="#" data-page="home">

                    <i class="fa-solid fa-house"></i>

                    <span>Inicio</span>

                </a>

            </li>

            <li>

                <a href="inicio.html" data-page="reportes">

                    <i class="fa-solid fa-clipboard-list"></i>

                    <span>Reportes</span>

                </a>

            </li>

            <li class="nav-logout">

                0

                <a href="reportes.html" class="activo" id="btn-logout">

                    <i class="fa-solid fa-right-from-bracket"></i>

                    <span>Cerrar sesión</span>

                </a>

            </li>

        </ul>

    </aside>



    <!-- CONTENIDO PRINCIPAL -->

    <main>

        <nav class="breadcrumb">

            <span>Inicio</span>

            <i class="fa-solid fa-chevron-right"></i>

            <span id="breadcrumb-page">Clientes</span>

        </nav>

        <div class="main-content">

            <div class="mb-2 d-flex justify-content-between align-items-center">

                <h4 class="mb-0">REPORTE DE CLIENTES</h4>

                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalSaveCliente">

                    REGISTRAR

                </button>

            </div>

            <div class="table-responsive">

                <table class="table">

                    <thead class="table-dark">

                        <tr>

                            <th>ID</th>

                            <th>Nombre</th>

                            <th>Apellido</th>
                            <th>Dni</th>
                            <th>Telefono</th>
                            <th>Direccion</th>
                            <th>Opciones</th>
                        </tr>
                    </thead>
                    <tbody id="table-cliente"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal REGISTRO CLIENTE -->

    <div class="modal fade" id="modalSaveCliente" tabindex="-1" aria-labelledby="modalCliente" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Modal title</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body">
                    <form class="container mt-4 needs-validation" novalidate>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="" class="form-label">Nombre</label>
                                <input type="text" class="form-control" id="" name="nombre" required />
                            </div>



                            <div class="col-md-6">
                                <label for="" class="form-label">Apellido</label>
                                <input type="text" class="form-control" id="c_nombre" name="apellido" required />
                            </div>



                            <div class="col-md-4">
                                <label for="" class="form-label">DNI</label>
                                <input type="text" class="form-control" id="c_dni" name="dni" required />
                            </div>


                            <div class="col-md-4">
                                <label for="" class="form-label">Teléfono</label>
                                <input type="tel" class="form-control" id="c_telefono" name="telefono" required />
                            </div>



                            <div class="col-md-4">
                                <label for="" class="form-label">Dirección</label>
                                <input type="text" class="form-control" id="c_direcciom" name="direccion" required />
                            </div>
                    
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Cerrar
                    </button>
                    <button type="button" class="btn btn-primary" id="btn-crearcliente">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
